name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Firebase credentials
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          # Copy the example file to the actual config file
          cp firebase-config.example.js firebase-config.js
          
          # Replace placeholders with actual secrets
          sed -i "s|YOUR_API_KEY|${FIREBASE_API_KEY}|g" firebase-config.js
          sed -i "s|YOUR_AUTH_DOMAIN|${FIREBASE_AUTH_DOMAIN}|g" firebase-config.js
          sed -i "s|YOUR_PROJECT_ID|${FIREBASE_PROJECT_ID}|g" firebase-config.js
          sed -i "s|YOUR_STORAGE_BUCKET|${FIREBASE_STORAGE_BUCKET}|g" firebase-config.js
          sed -i "s|YOUR_MESSAGING_SENDER_ID|${FIREBASE_MESSAGING_SENDER_ID}|g" firebase-config.js
          sed -i "s|YOUR_APP_ID|${FIREBASE_APP_ID}|g" firebase-config.js
          sed -i "s|YOUR_MEASUREMENT_ID|${FIREBASE_MEASUREMENT_ID}|g" firebase-config.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
